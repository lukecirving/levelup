<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>LevelUp</title>
<meta name="description" content="Golf, gym, habit, and diet tracker built around your own schedule.">
<meta name="theme-color" content="#f5f6f1" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#14181a" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LevelUp">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>LevelUp</h1>
      <span class="goal-chip" id="goalChip">Set tryout date</span>
    </header>
    <main class="view" id="view"></main>
    <nav class="tabbar" id="tabbar" aria-label="Primary"></nav>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
